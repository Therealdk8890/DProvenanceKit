name: Deploy landing page

# Publishes site/ to GitHub Pages. Source must be "GitHub Actions", enabled
# once in repo Settings → Pages (done). That one-time enablement is all the
# first deploy needs and it persists — configure-pages' `enablement: true`
# can't do it here because enabling Pages requires a token other than the
# default GITHUB_TOKEN (a PAT/App token), which this workflow doesn't carry.
# Custom domain dprovenance.dev lives in Pages settings (set via the API), not
# in this file. site/CNAME is ignored for Actions-based deploys — kept only as
# a fallback if the source is ever switched to "Deploy from a branch".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
