name: Deploy landing page

# Publishes site/ to GitHub Pages. Source must be "GitHub Actions", enabled
# once in repo Settings → Pages (done). That one-time enablement is all the
# first deploy needs and it persists — configure-pages' `enablement: true`
# can't do it here because enabling Pages requires a token other than the
# default GITHUB_TOKEN (a PAT/App token), which this workflow doesn't carry.
# Custom domain dprovenance.dev lives in Pages settings (set via the API), not
# in this file. site/CNAME is ignored for Actions-based deploys — kept only as
# a fallback if the source is ever switched to "Deploy from a branch".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "WebVisualizer/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      # Build the open-source WebVisualizer (the "Explorer") and stage it under
      # site/explorer so it ships to https://dprovenance.dev/explorer. It is built
      # fresh here rather than committed, so the hosted tool can never drift from its
      # source. --base makes the bundle's asset URLs absolute under /explorer/, and
      # the sample diff is compiled in, so the page renders with zero setup.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build the Explorer (WebVisualizer)
        working-directory: WebVisualizer
        run: |
          npm ci
          npm run build -- --base=/explorer/
      - name: Stage the Explorer under site/explorer
        run: |
          rm -rf site/explorer
          mkdir -p site/explorer
          cp -R WebVisualizer/dist/. site/explorer/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
