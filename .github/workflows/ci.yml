name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Run tests
        run: swift test
      - name: Run benchmark corpus
        run: swift run DProvenanceKitCLI evaluate
