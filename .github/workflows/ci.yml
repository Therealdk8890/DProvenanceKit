# Continuous integration for DProvenanceKit.
#
# Runs on macos-26 (GA since 2026-02-26) because DProvenanceFoundationModels
# imports Apple's FoundationModels framework, which requires the macOS 26 SDK
# shipped with Xcode 26+. Xcode is pinned explicitly rather than relying on
# the image default, which drifts as GitHub rolls the image forward weekly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: the build only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build and test (macOS 26, Xcode 26.5)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Run CLI evaluation (gated — fails the build on regression)
        run: swift run DProvenanceKitCLI evaluate --gate

      - name: Run Quickstart (compile-check of the documented API)
        run: swift run Quickstart

      - name: Run conformance harness
        run: swift run --package-path ConformanceHarness

      - name: Build iOS Core Library
        run: xcodebuild -scheme DProvenanceKit -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build

      - name: Build iOS UI Library
        run: xcodebuild -scheme DProvenanceUI -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build

      - name: Build iOS FoundationModels/OTel bridge
        run: xcodebuild -scheme DProvenanceFoundationModelsOTel -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build

      - name: Install WebVisualizer dependencies
        working-directory: WebVisualizer
        run: npm ci

      - name: Build WebVisualizer
        working-directory: WebVisualizer
        run: npm run build

  thread-sanitizer:
    name: Thread sanitizer (concurrency tests)
    runs-on: macos-26
    timeout-minutes: 30
    # Advisory for now: this is a newly added sanitizer over pre-existing hand-locked
    # @unchecked Sendable classes, so a first run may surface latent races that need
    # triage. It reports without blocking merges; flip to blocking once it's green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      # Ten @unchecked Sendable hand-locked classes, previously with no TSan coverage.
      # Scope to the burst/chaos/buffer suites so the race check stays fast.
      - name: Test concurrency suites under ThreadSanitizer
        run: swift test --sanitize=thread --filter 'Stress|Chaos|WriteBuffer|CircuitBreaker'

  boundary-guard:
    name: Free/paid boundary guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # This repo is the public, Apache-2.0 core: in-process, single-machine code only.
      # Paid, hosted, or cross-machine ("service") code, and separately-licensed premium
      # components, live in the private premium repo — never here. An Apache-2.0 release is
      # irrevocable, so we reject reserved premium namespaces BEFORE they can be merged and
      # shipped for free. See CONTRIBUTING.md "Free vs. paid boundary" and COMMERCIAL.md.
      - name: Reject premium-namespaced paths in the public Apache-2.0 tree
        run: |
          matches=$(git ls-files \
            | grep -E '(^|/)(Premium|Hosted)[^/]*/|(^|/)Private/|(Premium|Hosted)[^/]*\.swift' \
            || true)
          if [ -n "$matches" ]; then
            echo "::error::Premium-namespaced path(s) found in the public Apache-2.0 repo:"
            echo "$matches"
            echo "Move this code to the private premium repo under its commercial license."
            echo "Apache-2.0 releases cannot be clawed back — see CONTRIBUTING.md."
            exit 1
          fi
          echo "OK: no premium-namespaced paths in the public tree."

  secret-scan:
    name: Secret scan (no keys in the public tree)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # This repo is public and the billing setup (docs/BILLING_SETUP.md) deliberately keeps
      # Stripe secret keys, restricted keys, and webhook signing secrets OUT of the tree. Key
      # exposure via a public repo is the top cause of Stripe key compromise, so enforce it in
      # CI rather than relying on the written rule alone. gitleaks-action is free for public and
      # personal repos (no GITLEAKS_LICENSE needed). fetch-depth: 0 lets it scan full history.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for committed secrets (sk_/rk_/whsec_, etc.)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
