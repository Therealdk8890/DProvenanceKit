# Continuous integration for DProvenanceKit.
#
# Runs on macos-26 (GA since 2026-02-26) because DProvenanceFoundationModels
# imports Apple's FoundationModels framework, which requires the macOS 26 SDK
# shipped with Xcode 26+. Xcode is pinned explicitly rather than relying on
# the image default, which drifts as GitHub rolls the image forward weekly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: the build only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build and test (macOS 26, Xcode 26.5)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Run benchmark corpus (gated — fails the build on regression)
        run: swift run DProvenanceKitCLI evaluate --gate

      - name: Run Quickstart (compile-check of the documented API)
        run: swift run Quickstart

  ios-build:
    name: iOS build (device SDK — validates UIKit-only paths)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      # The whole pitch is on-device iOS, but `swift build` only host-builds macOS,
      # so DProvenanceUI's UIKit-only branches never compiled in CI. Build the library
      # products (not the CLI/sample executables) against the iOS SDK to catch that.
      - name: Build library products for iOS
        run: |
          set -o pipefail
          for scheme in DProvenanceUI DProvenanceFoundationModelsOTel; do
            xcodebuild build \
              -scheme "$scheme" \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO
          done

  thread-sanitizer:
    name: Thread sanitizer (concurrency tests)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      # Ten @unchecked Sendable hand-locked classes, previously with no TSan coverage.
      # Scope to the burst/chaos/buffer suites so the race check stays fast.
      - name: Test concurrency suites under ThreadSanitizer
        run: swift test --sanitize=thread --filter 'Stress|Chaos|WriteBuffer|CircuitBreaker'
