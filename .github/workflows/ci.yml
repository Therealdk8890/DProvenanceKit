# Continuous integration for DProvenanceKit.
#
# Runs on macos-26 (GA since 2026-02-26) because DProvenanceFoundationModels
# imports Apple's FoundationModels framework, which requires the macOS 26 SDK
# shipped with Xcode 26+. Xcode is pinned explicitly rather than relying on
# the image default, which drifts as GitHub rolls the image forward weekly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: the build only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build and test (macOS 26, Xcode 26.5)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test (with code coverage)
        run: swift test --enable-code-coverage

      # Non-gating visibility only: prints the library's line-coverage summary to the
      # build log so the number is measured on every PR. It never fails the build —
      # a runner-specific path hiccup must not turn a green test run red — and there is
      # no coverage floor. Tests, .build artifacts, and scratch/ are excluded so the
      # figure reflects the shipped Sources/.
      - name: Coverage summary (library line coverage, non-gating)
        continue-on-error: true
        run: |
          BIN=$(swift build --show-bin-path)
          XCTEST=$(ls -d "$BIN"/*.xctest | head -1)
          MACHO="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
          PROF="$BIN/codecov/default.profdata"
          echo "coverage inputs: bundle=$XCTEST profdata=$PROF"
          xcrun llvm-cov report "$MACHO" \
            -instr-profile "$PROF" \
            -ignore-filename-regex='(/Tests/|/\.build/|/scratch/)' \
            | tee "$RUNNER_TEMP/coverage.txt"
          echo "==== TOTAL (last line above) ===="
          tail -n 1 "$RUNNER_TEMP/coverage.txt"

      - name: Run CLI evaluation (gated — fails the build on regression)
        run: swift run DProvenanceKitCLI evaluate --gate

      - name: CLI fail-closed smoke (bad security args must exit 2, never weaken)
        run: |
          swift build --product dpk
          DPK=".build/debug/dpk"
          check2() {
            set +e; "$DPK" "$@" >/dev/null 2>&1; rc=$?; set -e
            if [ "$rc" -ne 2 ]; then echo "FAIL: expected exit 2, got $rc for: $*"; exit 1; fi
            echo "ok (exit 2): $*"
          }
          check2 evaluate --gate --min-f1=bogus
          check2 evaluate --gate --min-f1=nan
          check2 evaluate --gate --min-f1=-0.1
          check2 evaluate --min-f1=0.9
          check2 evaluate --gaet
          check2 evaluate --gate --help
          check2 verify --in=nonexistent.json --trusted-key=
          check2 verify --in=nonexistent.json --trusted-key=deadbeef
          check2 web-export --case=does-not-exist

      - name: Run Quickstart (compile-check of the documented API)
        run: swift run Quickstart

      - name: Run Foundation Models regression demo
        run: swift run FoundationModelsRegressionDemo --out="$RUNNER_TEMP/fm-regression.json"

      - name: Build live Foundation Models quickstart
        run: swift build --product FoundationModelsLiveQuickstart

      - name: Generate WebVisualizer export
        run: swift run DProvenanceKitCLI web-export --out="$RUNNER_TEMP/web-export.json"

      - name: Validate WebVisualizer artifacts
        run: |
          node - "$RUNNER_TEMP/fm-regression.json" "$RUNNER_TEMP/web-export.json" <<'NODE'
          const fs = require("node:fs");
          const allowedTypes = new Set(["added", "removed", "changed", "unchanged"]);

          function assert(condition, message) {
            if (!condition) throw new Error(message);
          }

          function walk(node, path = "tree") {
            assert(node && typeof node === "object", `${path} must be an object`);
            assert(typeof node.id === "string" && node.id.length > 0, `${path}.id must be a non-empty string`);
            assert(typeof node.label === "string" && node.label.length > 0, `${path}.label must be a non-empty string`);
            assert(allowedTypes.has(node.type), `${path}.type must be one of ${Array.from(allowedTypes).join(", ")}`);

            const children = node.children ?? [];
            assert(Array.isArray(children), `${path}.children must be an array when present`);
            children.forEach((child, index) => walk(child, `${path}.children[${index}]`));
          }

          for (const file of process.argv.slice(2)) {
            const document = JSON.parse(fs.readFileSync(file, "utf8"));
            assert(document.summary && typeof document.summary.regressionRisk === "string", `${file}: summary.regressionRisk is required`);
            assert(document.metrics && Number.isFinite(Number(document.metrics.driftScore)), `${file}: metrics.driftScore must be numeric`);
            walk(document.tree);
            console.log(`Validated ${file}`);
          }
          NODE

      - name: Run conformance harness
        run: swift run --package-path ConformanceHarness

      # Swift Package Index chooses the generated `DProvenanceKit-Package` scheme
      # when `xcodebuild -list` reports multiple schemes. Build that exact surface
      # so an executable target cannot silently break the package's compatibility.
      - name: Build full package with Xcode (macOS)
        run: xcodebuild -scheme DProvenanceKit-Package -destination 'generic/platform=macOS' CODE_SIGNING_ALLOWED=NO build

      - name: Build full package with Xcode (iOS)
        run: xcodebuild -scheme DProvenanceKit-Package -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build

      - name: Install WebVisualizer dependencies
        working-directory: WebVisualizer
        run: npm ci

      - name: Install Playwright browser
        working-directory: WebVisualizer
        run: npx playwright install chromium

      - name: Build WebVisualizer
        working-directory: WebVisualizer
        run: npm run build

      - name: Smoke test WebVisualizer export loading
        working-directory: WebVisualizer
        env:
          DPK_WEB_EXPORT_JSON: ${{ runner.temp }}/web-export.json
        run: npm run test:smoke

  swift-floor:
    # Proves the documented Swift 6.0/6.1 floor on every PR. This is the exact
    # environment that first broke a consumer (#57: dpk-starter on a stock macos-15
    # runner, Swift 6.1.2): without the FM module's outer `#if compiler(>=6.2)` gate
    # the build fails at parse time, and the core library's own compiler-gated
    # fallback branches (DProvenanceKit.swift) are never compiled anywhere else —
    # the macos-26 jobs always take the 6.2 side of every `#if compiler(>=6.2)`.
    # Library targets only: DProvenanceUI and the demo executables track the
    # latest-Xcode job above and are not part of the consumer floor contract.
    name: Swift 6.1 floor (library targets)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build core library
        run: swift build --target DProvenanceKit

      - name: Build Foundation Models module (FM surface compiles out pre-6.2)
        run: swift build --target DProvenanceFoundationModels

      - name: Build OTel bridges
        run: |
          swift build --target DProvenanceOTel
          swift build --target DProvenanceFoundationModelsOTel

      - name: Build CLI
        run: swift build --product dpk

  thread-sanitizer:
    name: Thread sanitizer (concurrency tests)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      # Ten @unchecked Sendable hand-locked classes, previously with no TSan coverage.
      # Scope to the burst/chaos/buffer suites so the race check stays fast.
      # InMemoryTraceStore is included because its suite carries a real concurrent
      # writes test that the previous filter silently skipped.
      - name: Test concurrency suites under ThreadSanitizer
        run: swift test --sanitize=thread --filter 'Stress|Chaos|WriteBuffer|CircuitBreaker|CloudTraceStoreRead|InMemoryTraceStore'

  boundary-guard:
    name: Free/paid boundary guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      # This repo is the public, Apache-2.0 core: in-process, single-machine code only.
      # Paid, hosted, or cross-machine ("service") code, and separately-licensed premium
      # components, live in the private premium repo — never here. An Apache-2.0 release is
      # irrevocable, so we reject reserved premium namespaces BEFORE they can be merged and
      # shipped for free. See CONTRIBUTING.md "Free vs. paid boundary" and COMMERCIAL.md.
      - name: Reject premium-namespaced paths in the public Apache-2.0 tree
        run: |
          matches=$(git ls-files \
            | grep -E '(^|/)(Premium|Hosted)[^/]*/|(^|/)Private/|(Premium|Hosted)[^/]*\.swift' \
            || true)
          if [ -n "$matches" ]; then
            echo "::error::Premium-namespaced path(s) found in the public Apache-2.0 repo:"
            echo "$matches"
            echo "Move this code to the private premium repo under its commercial license."
            echo "Apache-2.0 releases cannot be clawed back — see CONTRIBUTING.md."
            exit 1
          fi
          echo "OK: no premium-namespaced paths in the public tree."

      - name: Keep active public release versions aligned
        run: |
          sh .github/scripts/check-release-surfaces.sh --self-test
          sh .github/scripts/check-release-surfaces.sh

  secret-scan:
    name: Secret scan (no keys in the public tree)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # This repo is public and the billing setup (docs/BILLING_SETUP.md) deliberately keeps
      # Stripe secret keys, restricted keys, and webhook signing secrets OUT of the tree. Key
      # exposure via a public repo is the top cause of Stripe key compromise, so enforce it in
      # CI rather than relying on the written rule alone. gitleaks-action is free for public and
      # personal repos (no GITLEAKS_LICENSE needed). fetch-depth: 0 lets it scan full history.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for committed secrets (sk_/rk_/whsec_, etc.)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
