name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Build macOS
        run: swift build -v --destination 'platform=macOS'
      - name: Test macOS
        run: swift test -v --destination 'platform=macOS'
      - name: Build iOS Simulator
        run: swift build -v --destination 'generic/platform=iOS Simulator'
