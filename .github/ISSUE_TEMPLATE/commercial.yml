name: Commercial support or scoped engagement
description: Request the paid assurance pilot, integration help, training, or another defined service.
title: "Commercial inquiry: "
labels: ["commercial"]
body:
  - type: markdown
    attributes:
      value: |
        DProvenanceKit's public library is free under Apache 2.0, including commercial use and embedding subject to the license.

        The live self-serve offer is a **$1,500 one-time, 30-day assurance pilot for one workflow**. Other integration, assurance, support, or training work is scoped and quoted separately. There is no hosted/SaaS service, recurring support tier, SLA, indemnity, or compliance certification.

        This issue is public. Do not post confidential data, private trace payloads, or secrets.
  - type: input
    id: organization
    attributes:
      label: Organization
      description: Company, project, clinic, firm, or team name.
      placeholder: Acme AI Legal Tools
    validations:
      required: true
  - type: dropdown
    id: engagement
    attributes:
      label: What are you interested in?
      options:
        - $1,500 reasoning assurance pilot
        - Integration review or implementation workshop
        - CI regression-gate design
        - Trace-vocabulary or OpenTelemetry export review
        - Team training
        - Sponsorship or open-source support
        - Not sure yet
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Primary workflow
      options:
        - Legal AI drafting or review
        - On-device Foundation Models app
        - Agent regression testing
        - CI reasoning gate
        - OpenTelemetry trace export
        - Other
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What are you trying to prove, monitor, or de-risk?
      placeholder: We need to show which approved sources supported a draft before review.
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Desired outcome
      description: Name the concrete deliverable or decision that would make an engagement useful.
      placeholder: A repeatable CI gate that catches a missing source-retrieval step.
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Constraints
      description: Privacy, local-only operation, procurement, or timing needs. Keep confidential details out of this public issue.
      placeholder: Production data must remain local; invoice required.
  - type: input
    id: contact
    attributes:
      label: Preferred contact
      description: Email or GitHub handle.
      placeholder: name@example.com
    validations:
      required: true
