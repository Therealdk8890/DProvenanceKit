name: DProvenanceKitCloud
options:
  bundleIdPrefix: com.dprovenancekit
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: GV7F762399

# The package lives one level up (repo root). The generated .xcodeproj stays in
# this subdirectory so it does not shadow the SwiftPM package for
# `xcodebuild -scheme DProvenanceKit ...` at the repo root (which CI relies on).
packages:
  DProvenanceKit:
    path: ..

schemes:
  DProvenanceKitCloud:
    build:
      targets:
        DProvenanceKitCloud: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  DProvenanceKitCloud:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: DProvenanceKitCloudApp.swift
    dependencies:
      - package: DProvenanceKit
        product: DProvenanceKit
    settings:
      base:
        PRODUCT_NAME: DProvenanceKitCloud
        PRODUCT_BUNDLE_IDENTIFIER: com.dprovenancekit.cloud
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Info.plist
      properties:
        CFBundleName: DProvenanceKitCloud
        CFBundleDisplayName: DProvenanceKitCloud
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.developer-tools
        ITSAppUsesNonExemptEncryption: false
